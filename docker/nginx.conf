worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time '
                    'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 30M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # ─── Backend upstream: least_conn — ip_hash KALDIRILDI ──────────────────
    #
    # Neden ip_hash gerekmez?
    # Socket.IO'nun HTTP long-polling modu, her HTTP isteğini ayrı bir sunucuya
    # gönderebilir; bu yüzden session tutarlılığı için sticky session lazımdır.
    #
    # Bu yapılandırmada transports: ['websocket'] ile polling tamamen devre dışı.
    # WebSocket = kalıcı tek TCP bağlantısı; bağlantı kurulduktan sonra tüm
    # trafiği aynı sunucu üzerinden geçer — sticky session kavramı anlamsız hale gelir.
    #
    # Redis Adapter (@socket.io/redis-adapter) üstüne düşeni yapar:
    #   • io.to(room).emit()  → Redis Pub/Sub → tüm node'lardaki üyelere iletilir
    #   • io.emit()           → tüm node'lardaki tüm socketlere iletilir
    #   • DM / bildirimler    → user:<id> odasına emit → Redis üzerinden doğru node'a
    #
    upstream backend {
        least_conn;
        server backend:5000  max_fails=3 fail_timeout=30s;
        server backend2:5000 max_fails=3 fail_timeout=30s;
        # WebSocket bağlantıları uzun süreli: keepalive yüksek tutulur
        keepalive 64;
    }

    # ─── Frontend upstream: least_conn (stateless, round-robin yeterli) ─────
    upstream frontend {
        least_conn;
        server frontend:80  max_fails=3 fail_timeout=30s;
        server frontend2:80 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ─── MinIO upstream ──────────────────────────────────────────────────────
    upstream minio {
        server minio:9000;
        keepalive 8;
    }

    upstream minio_console {
        server minio:9001;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;


        # ── MinIO Web Console (opsiyonel, sadece geliştirme) ─────────────
        location /minio-console/ {
            rewrite ^/minio-console/(.*)$ /$1 break;
            proxy_pass http://minio_console;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── REST API (load balanced: 2 backend node) ──────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Socket.IO (WebSocket-only — sticky session GEREKMEZ) ─────────
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket bağlantısı açık kalır — timeout uzun tutulur
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 60s;
        }

        # ── Health check ─────────────────────────────────────────────────
        location /health {
            proxy_pass http://backend/health;
            access_log off;
            proxy_set_header Host $host;
        }

        # ── Frontend (load balanced: 2 frontend node) ────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            # SPA routing: try files, fallback to index.html
            proxy_intercept_errors on;
            error_page 404 = @frontend_fallback;
        }

        location @frontend_fallback {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
